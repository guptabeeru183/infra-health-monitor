# Netdata Configuration Overrides
# ================================
# This file contains customizations for the Netdata monitoring stack
# All settings here override default Netdata configurations

[global]
    # Run mode: standalone, replicate, or hub
    mode = standalone
    
    # Enable/disable self-monitoring
    self monitoring = yes
    
    # Memory mode: ram, save, none, map, dbengine
    # Use dbengine for persistent storage with compression
    memory mode = dbengine
    
    # Number of days to keep in the database
    # This applies to dbengine mode
    # With compression, approximately 1MB per day per metric
    dbengine disk space = 256
    
    # Netdata home directory
    config directory = /etc/netdata
    cache directory = /var/cache/netdata
    lib directory = /var/lib/netdata
    log directory = /var/log/netdata

[prometheus]
    # Enable Prometheus exporter (CRITICAL FOR PROMETHEUS INTEGRATION)
    # This exposes metrics in Prometheus format at http://localhost:19999/api/v1/allmetrics
    enabled = yes
    
    # Listen on all interfaces (Docker container requirement)
    listen on = 0.0.0.0:19999
    
    # Expose metrics in OpenMetrics format (compatible with Prometheus)
    # Available formats: prometheus, openmetrics
    # Default: prometheus (standard Prometheus text format)
    server = prometheus

[web]
    # Netdata UI/API port (different from Prometheus exporter port)
    default port = 19999
    
    # Enable CORS for cross-origin requests
    enable gzip compression = yes
    gzip compression level = 6

[backends]
    # Optional: Send metrics to backend (e.g., InfluxDB, Graphite)
    # Not needed when using Prometheus scrape
    enabled = no
    # type = prometheus
    # destination = http://prometheus:9090
    # send charts matching = *
    # send every = 10

[health]
    # Enable health checks (used for generating alerts)
    enabled = yes
    
    # Store alert status in SQLite database
    # Allows Netdata to remember alert status across restarts
    enabled in SQLite = yes
    
    # Redis backend for persistence (optional)
    # redis background = no

[plugins:proc]
    # System monitoring plugin
    enabled = yes
    update every = 1

[plugins:cgroups]
    # Container/cgroup monitoring
    enabled = yes
    update every = 1

[plugins:apps]
    # Per-process monitoring
    enabled = yes
    update every = 1

[plugins:ebpf]
    # eBPF monitoring (Linux-specific, advanced)
    # Requires kernel support
    enabled = no

[plugin:docker]
    # Docker monitoring (if running in/around Docker)
    enabled = no

[plugin:go.d:prometheus]
    # If collecting from application Prometheus endpoints
    # This allows Netdata to scrape and re-export metrics
    enabled = no
    # endpoint = http://localhost:8080/metrics

[system]
    # Run Netdata with normal priority
    run as user = netdata
    
    # DNS resolution
    # use hostnames = yes
    
    # Kernel metrics (full system monitoring)
    enabled = yes

# ============================================================================
# METRIC COLLECTION INTERVALS
# ============================================================================
# Default: 1 second for most metrics
# For Prometheus scraping (15-30s), this is fine - Prometheus aggregates

[tc]
    # Linux traffic control monitoring
    enabled = yes
    update every = 5

[nfacct]
    # Netfilter accounting
    enabled = no

[fping]
    # Ping monitoring (optional)
    enabled = no

# ============================================================================
# ALERT CONFIGURATION
# ============================================================================

[health default]
    # Default alert notification settings
    enabled = yes
    
    # Alert retry behavior
    # alarm scroll on charts = no

[health.alarm]
    # Database-specific alert configuration
    # Example: configure specific thresholds
    # Can be extended per metric in alarm rules

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

[database]
    # Update database every 1 second (default)
    update every = 1
    
    # Number of historical data points to keep in memory
    # Older data is stored in dbengine
    history = 3600  # 1 hour at 1-second resolution
    
    # Pagesize for dbengine
    pagesize = 4096

[buffer]
    # Internal buffer sizes (usually don't need adjustment)
    # for 1-second updates with 1000+ metrics
    enabled = yes

# ============================================================================
# SECURITY/HARDENING
# ============================================================================

[web]
    # Disable data access from non-localhost (optional)
    # prevent dataloss = yes
    
    # Enable websocket support
    enable web responses gzip compression = yes

# ============================================================================
# PROMETHEUS SCRAPE ENDPOINTS
# ============================================================================
#
# After enabling [prometheus], Netdata exposes:
#
# 1. Prometheus Exporter:
#    - Endpoint: http://netdata:19999/api/v1/allmetrics?format=prometheus
#    - Format: Prometheus text format
#    - Returns: All metrics from all collectors
#
# 2. Netdata REST API:
#    - Endpoint: http://netdata:19999/api/v1/...
#    - Format: JSON
#    - Used by Netdata UI and integrations
#
# 3. Netdata Graph API:
#    - Endpoint: http://netdata:19999/api/v1/data
#    - Returns historical data for graphing
#
# Prometheus scrape configuration (in prometheus.yml):
# 
# scrape_configs:
#   - job_name: 'netdata'
#     static_configs:
#       - targets: ['netdata:19999']
#     metrics_path: '/api/v1/allmetrics'
#     params:
#       format: ['prometheus']
#     scrape_interval: 15s
#     scrape_timeout: 10s
#
# ============================================================================

# ============================================================================
# COMMON METRICS EXPOSED
# ============================================================================
#
# CPU Metrics:
#   - node_cpu_seconds_total (time spent in different modes)
#   - cpu_load1, cpu_load5, cpu_load15 (load averages)
#   - cpu_guests, cpu_steal (virtualization)
#
# Memory Metrics:
#   - node_memory_MemTotal_bytes (total memory)
#   - node_memory_MemAvailable_bytes (available memory)
#   - node_memory_MemFree_bytes (free memory)
#   - node_memory_Buffers_bytes (buffers)
#   - node_memory_Cached_bytes (cache)
#
# Disk Metrics:
#   - node_filesystem_avail_bytes (available space)
#   - node_filesystem_size_bytes (total space)
#   - node_filesystem_files (inode count)
#   - node_disk_io_now (current I/O operations)
#
# Network Metrics:
#   - node_network_receive_bytes_total (bytes received)
#   - node_network_transmit_bytes_total (bytes sent)
#   - node_network_receive_packets_total
#   - node_network_transmit_packets_total
#
# Process Metrics:
#   - system_processes_total (total processes)
#   - system_processes_running (running processes)
#   - system_context_switches_total (context switches)
#
# ============================================================================

# ============================================================================
# NETDATA HEALTH CHECKS/ALERTS
# ============================================================================
#
# Netdata can generate alerts and send them to various backends:
#
# Alert notification methods:
#   - email (requires SMTP configuration)
#   - slack (requires webhook URL)
#   - discord, telegram, pagerduty, etc.
#
# How Netdata alerts work:
#   1. Health check conditions are evaluated every 1 second
#   2. When condition is met, alert is triggered
#   3. Alert notification is sent to configured recipients
#   4. Alert is cleared when condition is no longer met
#
# These alerts are SEPARATE from Prometheus alerting:
#   - Netdata alerts: Real-time, fine-tuned, local
#   - Prometheus alerts: Based on metrics queries, rule-based
#
# For this integration, we primarily use Prometheus alerts
# (configured in prometheus.yml and alert-rules.yml)
# But Netdata alerts can also be useful for real-time notifications
#
# ============================================================================
