    #     description: '{{ .GroupLabels.alertname }}'

  # Warning level alerts receiver
  - name: 'warning-receiver'
    # email_configs:
    #   - to: 'warnings@example.com'

  # Team-specific receivers
  - name: 'prometheus-team'
    # email_configs:
    #   - to: 'prometheus-team@example.com'

  - name: 'infrastructure-team'
    # email_configs:
    #   - to: 'infra-team@example.com'

# Inhibition rules - suppress alerts under certain conditions
inhibit_rules:
  # Suppress warning and info severity alerts if critical alert exists
  - source_match:
      severity: 'critical'
    target_match_re:
      severity: 'warning|info'
    equal: ['alertname', 'cluster', 'service']

  # Suppress alerts for a service if the service itself is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*Metric.*'
    equal: ['service']
