global:
  resolve_timeout: 5m
  # SMTP Configuration for email notifications
  # Uncomment and configure to enable email alerts
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_auth_username: 'alerts@example.com'
  # smtp_auth_password: '${SMTP_PASSWORD}'
  # smtp_from: 'alertmanager@example.com'

# Templates for notification messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Alert routing tree
route:
  # Default receiver for all alerts
  receiver: 'null-receiver'
  
  # How to group alerts
  group_by: ['alertname', 'cluster', 'service']
  
  # Wait before sending initial notification (group notifications)
  group_wait: 30s
  
  # Wait before sending updated notification for same group
  group_interval: 5m
  
  # How long to wait before resending notification for same group
  repeat_interval: 12h

  # Sub-routes for specific alert types
  routes:
    # Critical infrastructure alerts
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: true

    # Warning level alerts
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 4h

    # Service-specific routing
    - match:
        service: prometheus
      receiver: 'prometheus-team'
      continue: true

    - match:
        service: netdata
      receiver: 'infrastructure-team'
      continue: true

# Define receivers (notification targets)
receivers:
  # Null receiver - silences alerts (used as default)
  - name: 'null-receiver'

  # Critical alerts receiver
  # Configure email, Slack, PagerDuty, etc.
  - name: 'critical-receiver'
    # Email notifications
    # email_configs:
    #   - to: 'critical-alerts@example.com'
