global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  
# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/alert-rules.yml
  # Recording rules can be added here for performance optimization
  # - /etc/prometheus/recording-rules.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Netdata - Real-time system monitoring
  # Collects metrics from Netdata agent/parent
  - job_name: 'netdata'
    metrics_path: /api/v1/allmetrics
    params:
      format: [prometheus]
    honor_labels: yes
    static_configs:
      - targets: ['netdata:19999']
    relabel_configs:
      # Rename labels from netdata for consistency
      - source_labels: [__address__]
        target_label: instance

  # Uptime Kuma - Availability monitoring
  # Monitors service uptime and generates availability metrics
  - job_name: 'uptime-kuma'
    scrape_interval: 30s  # Uptime checks are less frequent than system metrics
    static_configs:
      - targets: ['uptime-kuma-exporter:5000']  # Custom exporter bridge
        labels:
          service: 'uptime-monitoring'
          monitor_type: 'availability'
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'uptime-kuma'

  # OpenTelemetry Collector - Metrics from OTLP protocol
  # Collects metrics exported by OTEL SDKs and re-exports in Prometheus format
  - job_name: 'otel-collector'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: 'observability'
          monitor_type: 'telemetry'
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'otel-collector'

  # Add your application monitoring targets here
  # Example for a custom application:
  # - job_name: 'my-app'
  #   static_configs:
  #     - targets: ['localhost:9100']
  #       labels:
  #         environment: 'development'
  #
  # Example for distributed hosts:
  # - job_name: 'netdata-remote-host1'
  #   static_configs:
  #     - targets: ['host1.example.com:19999']
  #       labels:
  #         instance: 'host1'
  #
  # - job_name: 'netdata-remote-host2'
  #   static_configs:
  #     - targets: ['host2.example.com:19999']
  #       labels:
  #         instance: 'host2'

# ServiceMonitor discovery for Kubernetes (optional, commented out)
# Uncomment if running on Kubernetes with Prometheus Operator
#  - job_name: 'kubernetes-pods'
#    kubernetes_sd_configs:
#      - role: pod
#    relabel_configs:
#      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
#        action: keep
#        regex: true

