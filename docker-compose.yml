# Infra Health Monitor - Docker Compose Orchestration
#
# This is the main orchestration file that brings together all monitoring systems:
# - Prometheus (metrics collection)
# - Grafana (visualization)
# - Alertmanager (alert routing)
# - Netdata (real-time system monitoring)
# - SigNoz (logs, metrics, traces)
# - Uptime Kuma (uptime monitoring)
#
# All services run on a custom bridge network for isolation.
# Data is persisted using named volumes.
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f        # View logs

version: '3.8'

# ============================================================================
# SERVICES
# ============================================================================

services:

  # ========== PROMETHEUS ==========
  # Metrics collection and time-series database (from dockprom)
  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    hostname: prometheus
    networks:
      - monitoring-network
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      # Use dockprom's Prometheus configuration
      - ./stack/dockprom/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./stack/dockprom/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      # Store metrics data in named volume
      - prometheus-storage:/prometheus
    environment:
      - TZ=UTC
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-50GB}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      - alertmanager

  # ========== GRAFANA ==========
  # Unified visualization and dashboarding (from dockprom)
  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    hostname: grafana
    networks:
      - monitoring-network
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      # Grafana data and configurations
      - grafana-storage:/var/lib/grafana
      # Datasources provisioning
      - ./configs/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Dashboards provisioning
      - ./dashboards/grafana:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION=false
      - GF_SECURITY_LOGIN_ATTEMPTS=5
      - GF_SECURITY_LOGIN_MAX_LIFETIME=86400000
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      - prometheus

  # ========== ALERTMANAGER ==========
  # Alert routing and notification management (from dockprom)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: monitoring-alertmanager
    hostname: alertmanager
    networks:
      - monitoring-network
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      # Use dockprom's Alertmanager configuration
      - ./stack/dockprom/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      # Store alert data in named volume
      - alertmanager-storage:/alertmanager
    environment:
      - SLACK_URL=${SLACK_WEBHOOK_CRITICAL:-}
      - PAGERDUTY_URL=${PAGERDUTY_SERVICE_KEY:-}
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ========== NETDATA ==========
  # Real-time system monitoring (from netdata submodule)
  # Note: In production, Netdata would run as agent on each host
  netdata:
    image: netdata/netdata:latest
    container_name: monitoring-netdata
    hostname: netdata
    networks:
      - monitoring-network
    ports:
      - "${NETDATA_PORT:-19999}:19999"
    volumes:
      # Required for system metrics
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/timezone:/host/etc/timezone:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/shadow:/host/etc/shadow:ro
      - /etc/group:/host/etc/group:ro
      - /etc/gshadow:/host/etc/gshadow:ro
      # Netdata data volume
      - netdata-storage:/var/lib/netdata
    environment:
      - PGID=0
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
      - NETDATA_CLAIM_URL=${NETDATA_CLAIM_URL:-}
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19999/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ========== SIGNOZ CLICKHOUSE ==========
  # Backend database for SigNoz (stores logs, metrics, traces)
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:22.12-alpine
    container_name: monitoring-signoz-clickhouse
    hostname: signoz-clickhouse
    networks:
      - monitoring-network
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000"
    volumes:
      # ClickHouse data volume
      - signoz-clickhouse-storage:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=signoz
      - CLICKHOUSE_USER=signoz
      - CLICKHOUSE_PASSWORD=signoz
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on: []

  # ========== SIGNOZ QUERY SERVICE ==========
  # API and visualization backend for SigNoz
  signoz-query-service:
    image: signoz/query-service:latest
    container_name: monitoring-signoz-query-service
    hostname: signoz-query-service
    networks:
      - monitoring-network
    ports:
      - "${SIGNOZ_PORT:-3301}:3301"
    environment:
      - ClickHouseURL=http://signoz-clickhouse:8123/?database=signoz&username=signoz&password=signoz
      - STORAGE=clickhouse
      - GODEBUG=madvdontneed=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3301/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      - signoz-clickhouse

  # ========== SIGNOZ OTEL COLLECTOR ==========
  # Collects metrics, logs, and traces via OpenTelemetry protocol
  signoz-otel-collector:
    image: signoz/otel-collector-contrib:latest
    container_name: monitoring-signoz-otel-collector
    hostname: signoz-otel-collector
    networks:
      - monitoring-network
    ports:
      # OTLP gRPC
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT:-4317}:4317"
      # OTLP HTTP
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT:-4318}:4318"
      # Metrics
      - "${OTEL_COLLECTOR_METRICS_PORT:-8888}:8888"
    volumes:
      - ./configs/signoz-otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command:
      - "--config=/etc/otel-collector-config.yml"
    environment:
      - CLICKHOUSE_URL=http://signoz-clickhouse:8123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      - signoz-clickhouse

  # ========== UPTIME KUMA ==========
  # Service uptime monitoring and status page
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: monitoring-uptime-kuma
    hostname: uptime-kuma
    networks:
      - monitoring-network
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      # Uptime Kuma data volume
      - uptime-kuma-storage:/app/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  monitoring-network:
    driver: bridge
    name: ${MONITORING_NETWORK:-monitoring-network}
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  # Prometheus metrics storage
  prometheus-storage:
    driver: local
    name: infra-monitor-prometheus-storage

  # Grafana configuration and dashboards
  grafana-storage:
    driver: local
    name: infra-monitor-grafana-storage

  # Alertmanager state
  alertmanager-storage:
    driver: local
    name: infra-monitor-alertmanager-storage

  # Netdata metrics cache
  netdata-storage:
    driver: local
    name: infra-monitor-netdata-storage

  # SigNoz ClickHouse data
  signoz-clickhouse-storage:
    driver: local
    name: infra-monitor-signoz-clickhouse-storage

  # Uptime Kuma monitors and status
  uptime-kuma-storage:
    driver: local
    name: infra-monitor-uptime-kuma-storage
